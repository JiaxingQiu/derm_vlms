{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<h1>Login</h1>

<form method="post">
    {% csrf_token %}
    <div>
        <label for="login_id">Login id</label>
        <input type="text" name="login_id" id="login_id" required>
    </div>

    <button type="submit">Enter</button>
</form>

{% if error_message %}
<p>{{ error_message }}</p>
{% endif %}

{% endblock %}
