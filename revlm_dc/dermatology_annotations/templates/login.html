{% extends "base.html" %}

{% block title %}Login / Register{% endblock %}

{% block content %}
<div style="text-align:right;padding:10px 16px 0">
    <a href="https://www.youtube.com/watch?v=eMlx5fFNoYc" target="_blank" rel="noopener"
       style="font-size:.82rem;color:#007bff;text-decoration:underline;font-weight:600">&#9654; Watch Instruction Video</a>
</div>
<style>
.login-card{max-width:440px;margin:60px auto}
.login-card h2{font-size:1.4rem;margin-bottom:1.2rem}
.login-card .form-group label{font-weight:600;font-size:.88rem}
.login-card .form-control{font-size:.92rem}
.login-card .btn{font-size:.92rem}
.reg-fields{display:none}
.reg-fields.open{display:block}
.login-card .alert{font-size:.88rem;margin-top:.8rem}
.req-star{color:#dc3545;margin-left:2px}
</style>

<div class="login-card card shadow-sm">
<div class="card-body">
    <h2 class="text-center" id="page-title">Login</h2>

    {% if error_message %}
    <div class="alert alert-danger" role="alert">{{ error_message }}</div>
    {% endif %}
    {% if success_message %}
    <div class="alert alert-success" role="alert">{{ success_message }}</div>
    {% endif %}

    <form method="post" id="auth-form" novalidate>
        <input type="hidden" name="action" id="form-action" value="login">

        <div class="form-group">
            <label for="login_id">Username<span class="req-star">*</span></label>
            <input type="text" class="form-control" name="login_id" id="login_id"
                   value="{{ form_data.login_id|default:'' }}"
                   required autocomplete="username" autofocus>
        </div>

        <!-- Registration profile fields (hidden until user clicks Register) -->
        <div class="reg-fields {% if show_register %}open{% endif %}" id="reg-fields">
            <div class="form-group">
                <label for="full_name">Full Name (First Last)<span class="req-star">*</span></label>
                <input type="text" class="form-control" name="full_name" id="full_name"
                       value="{{ form_data.full_name|default:'' }}">
            </div>
            <div class="form-group">
                <label for="occupation">Occupation<span class="req-star">*</span></label>
                <select class="form-control" name="occupation" id="occupation">
                    <option value="">-- Select --</option>
                    <option value="Dermatologist" {% if form_data.occupation == 'Dermatologist' %}selected{% endif %}>Dermatologist</option>
                    <option value="PCP" {% if form_data.occupation == 'PCP' %}selected{% endif %}>PCP</option>
                </select>
            </div>
            <div class="form-group">
                <label for="years_experience">Years at this occupation<span class="req-star">*</span></label>
                <input type="number" class="form-control" name="years_experience" id="years_experience"
                       value="{{ form_data.years_experience|default:'' }}"
                       min="0" max="100" step="1" placeholder="e.g. 5">
                <small class="yrs-error" id="yrs-error" style="display:none;color:#dc3545;font-size:.82rem">
                    Must be a whole number between 0 and 100.
                </small>
            </div>
            <div class="form-group" id="institution-group" style="display:none">
                <label for="institution">Institution / Hospital Name<span class="req-star">*</span></label>
                <div id="institution-derm" style="display:none">
                    <input type="text" class="form-control" name="institution" id="institution-text"
                           value="{{ form_data.institution|default:'' }}"
                           placeholder="e.g. University of Virginia">
                </div>
                <div id="institution-pcp" style="display:none">
                    <select class="form-control" name="institution_type" id="institution-select">
                        <option value="">-- Select --</option>
                        <option value="FQHC">FQHC</option>
                        <option value="Academic">Academic</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" class="form-control mt-2" id="institution-other"
                           placeholder="Please specify" style="display:none"
                           value="{{ form_data.institution|default:'' }}">
                </div>
            </div>
            <div class="form-group">
                <label for="zip_code">Zip Code<span class="req-star">*</span></label>
                <input type="text" class="form-control" name="zip_code" id="zip_code"
                       value="{{ form_data.zip_code|default:'' }}"
                       placeholder="e.g. 22903">
            </div>
        </div>

        <!-- Buttons: toggle between login and register modes -->
        <div id="login-buttons">
            <button type="submit" class="btn btn-primary btn-block" id="btn-login">Log in</button>
            <button type="button" class="btn btn-outline-secondary btn-block mt-2" id="btn-show-register">
                New? Register
            </button>
        </div>
        <div id="register-buttons" style="display:none">
            <button type="submit" class="btn btn-success btn-block" id="btn-register">
                Complete registration
            </button>
            <button type="button" class="btn btn-outline-secondary btn-block mt-2" id="btn-back-login">
                &larr; Back to login
            </button>
        </div>
    </form>
</div>
</div>

<script>
(function () {
    var regFields = document.getElementById('reg-fields');
    var loginBtns = document.getElementById('login-buttons');
    var regBtns = document.getElementById('register-buttons');
    var actionInput = document.getElementById('form-action');
    var title = document.getElementById('page-title');

    var occupationEl = document.getElementById('occupation');
    var instGroup = document.getElementById('institution-group');
    var instDerm = document.getElementById('institution-derm');
    var instPcp = document.getElementById('institution-pcp');
    var instSelect = document.getElementById('institution-select');
    var instOther = document.getElementById('institution-other');
    var instText = document.getElementById('institution-text');

    function syncInstitution() {
        var occ = occupationEl.value;
        if (!occ) {
            instGroup.style.display = 'none';
            return;
        }
        instGroup.style.display = '';
        if (occ === 'Dermatologist') {
            instDerm.style.display = '';
            instPcp.style.display = 'none';
        } else {
            instDerm.style.display = 'none';
            instPcp.style.display = '';
        }
    }

    occupationEl.addEventListener('change', syncInstitution);
    syncInstitution();

    var yrsEl = document.getElementById('years_experience');
    var yrsErr = document.getElementById('yrs-error');
    function validateYears() {
        var raw = yrsEl.value.trim();
        if (!raw) { yrsErr.style.display = 'none'; yrsEl.style.borderColor = ''; return; }
        var v = Number(raw);
        var bad = !Number.isInteger(v) || v < 0 || v > 100;
        yrsErr.style.display = bad ? '' : 'none';
        yrsEl.style.borderColor = bad ? '#dc3545' : '';
    }
    yrsEl.addEventListener('blur', validateYears);
    yrsEl.addEventListener('input', validateYears);

    instSelect.addEventListener('change', function () {
        instOther.style.display = instSelect.value === 'Other' ? '' : 'none';
        if (instSelect.value !== 'Other') instOther.value = '';
    });

    var form = document.getElementById('auth-form');
    form.addEventListener('submit', function (e) {
        if (actionInput.value === 'register') {
            var yrsEl = document.getElementById('years_experience');
            var v = Number(yrsEl.value);
            if (!Number.isInteger(v) || v < 0 || v > 100) {
                e.preventDefault();
                alert('Years at this occupation must be a whole number between 0 and 100.');
                yrsEl.focus();
                return;
            }
        }
        if (occupationEl.value === 'PCP') {
            var val = instSelect.value === 'Other' ? instOther.value : instSelect.value;
            instText.value = val;
        }
    });

    function showRegister() {
        title.textContent = 'Register';
        regFields.classList.add('open');
        loginBtns.style.display = 'none';
        regBtns.style.display = 'block';
        actionInput.value = 'register';
        document.getElementById('login_id').focus();
    }

    function showLogin() {
        title.textContent = 'Login';
        regFields.classList.remove('open');
        loginBtns.style.display = 'block';
        regBtns.style.display = 'none';
        actionInput.value = 'login';
        document.getElementById('login_id').focus();
    }

    document.getElementById('btn-show-register').addEventListener('click', showRegister);
    document.getElementById('btn-back-login').addEventListener('click', showLogin);

    {% if show_register %}
    showRegister();
    {% endif %}
})();
</script>

{% endblock %}
